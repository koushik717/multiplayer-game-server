worker_processes auto;

events {
    worker_connections 2048;
}

http {
    # ── Upstream: Game Server Instances ──
    upstream game_servers {
        # ip_hash ensures the same client always hits the same server
        # Critical for WebSocket sticky sessions
        ip_hash;

        server game-server-1:3000;
        server game-server-2:3000;
        server game-server-3:3000;
    }

    # ── Connection upgrade map for WebSocket ──
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80;

        # ── WebSocket endpoint ──
        location /ws {
            proxy_pass http://game_servers;
            proxy_http_version 1.1;

            # WebSocket upgrade headers
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # Forward client info
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts for long-lived WebSocket connections
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ── HTTP API endpoints ──
        location / {
            proxy_pass http://game_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
